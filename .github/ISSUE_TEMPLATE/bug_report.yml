name: Bug report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below.
        For security issues, do **not** open a public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I... I expected... but instead...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add ZIP '...'
        2. Set options '...'
        3. Run
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown in the release name / file you downloaded.
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: how-run
    attributes:
      label: How are you running it?
      options:
        - Portable release (App)
        - CLI (gptakeout)
        - Built from source
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2 (x64)
  - type: textarea
    id: logs
    attributes:
      label: Log / crash dump
      description: |
        Attach the relevant file from `%LocalAppData%\GPhotosTakeout\logs\`
        (run log or crash-*.log). It is local-only and never sent anywhere automatically.
      render: text
