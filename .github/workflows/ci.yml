name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    env:
      MIN_LINE: 65
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Check for vulnerable dependencies
        run: dotnet list package --vulnerable --include-transitive

      - name: Restore (Core + Tests)
        run: dotnet restore tests/GPhotosTakeout.Tests/GPhotosTakeout.Tests.csproj

      - name: Build Core
        run: dotnet build src/GPhotosTakeout.Core/GPhotosTakeout.Core.csproj -c Release --no-restore

      - name: Build CLI
        run: dotnet build src/GPhotosTakeout.Cli/GPhotosTakeout.Cli.csproj -c Release

      - name: CLI smoke test
        shell: pwsh
        run: |
          $cliExe = Get-ChildItem -Recurse src/GPhotosTakeout.Cli -Filter gptakeout.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cliExe) {
            dotnet publish src/GPhotosTakeout.Cli/GPhotosTakeout.Cli.csproj -c Release -o cli-out --self-contained false
            $cliExe = Get-Item cli-out/GPhotosTakeout.Cli.exe
          }
          & $cliExe.FullName --help
          if ($LASTEXITCODE -ne 0) { Write-Error "CLI --help returned non-zero exit code."; exit 1 }

      - name: Test with coverage
        run: >
          dotnet test tests/GPhotosTakeout.Tests/GPhotosTakeout.Tests.csproj
          -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "trx;LogFileName=test-results.trx"

      - name: Coverage summary and gate
        if: always()
        shell: pwsh
        run: |
          $f = Get-ChildItem -Recurse ./coverage -Filter coverage.cobertura.xml -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $f) { Write-Warning "No coverage report found."; exit 0 }
          [xml]$x = Get-Content $f.FullName
          $linePct = [math]::Round([double]$x.coverage.'line-rate' * 100, 1)
          $branchPct = [math]::Round([double]$x.coverage.'branch-rate' * 100, 1)
          "### Code coverage" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| Metric | Coverage |"  | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "|--------|----------|"  | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| Line   | $linePct% |" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "| Branch | $branchPct% |" | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $min = [int]($env:MIN_LINE ?? 0)
          if ($linePct -lt $min) { Write-Error "Line coverage $linePct% is below the $min% gate."; exit 1 }

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            ./coverage/**/*.trx
            ./coverage/**/coverage.cobertura.xml

  build-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build WinUI app (x64, unpackaged)
        run: dotnet build src/GPhotosTakeout.App/GPhotosTakeout.App.csproj -c Release -p:Platform=x64

  security:
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build for CodeQL
        run: dotnet build GPhotosTakeout.sln -c Release

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:csharp
