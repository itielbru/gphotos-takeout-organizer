name: MSIX package (manual)

# Opt-in only: the Store/MSIX path is kept alive but does not gate CI or releases.
on:
  workflow_dispatch:

jobs:
  package-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Sync manifest version from Directory.Build.props
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = ($props.Project.PropertyGroup.Version | Where-Object { $_ }) | Select-Object -First 1
          if (-not $version) { Write-Error "No <Version> found in Directory.Build.props"; exit 1 }
          $manifestPath = "src/GPhotosTakeout.App/Package.appxmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $manifest.Package.Identity.Version = "$version.0"
          $manifest.Save((Resolve-Path $manifestPath))
          Write-Host "Package.appxmanifest Identity/@Version set to $version.0"

      - name: Build MSIX (Store, x64, unsigned)
        run: dotnet build src/GPhotosTakeout.App/GPhotosTakeout.App.csproj -c Release -p:Platform=x64 -p:Packaging=true

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-x64
          path: src/GPhotosTakeout.App/AppPackages/**/*.msix
