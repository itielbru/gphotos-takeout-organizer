name: Release

# Tag-driven portable release. Push a tag like v1.0.0 to build single-file,
# self-contained EXEs for the App and the CLI (win-x64 + win-arm64) and attach
# them to a draft GitHub Release. No zips: each artifact is one downloadable .exe.
# ExifTool is not bundled — the App installs it on first run with one click (into
# %LocalAppData%\GPhotosTakeout\Tools), and the CLI reuses that install or takes
# an explicit --exiftool path.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: ARM64
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish App single-file (${{ matrix.rid }})
        run: >
          dotnet publish src/GPhotosTakeout.App/GPhotosTakeout.App.csproj
          -c Release -p:Platform=${{ matrix.platform }} -r ${{ matrix.rid }}
          --self-contained -p:WindowsPackageType=None -p:PublishSingleFile=true
          -o publish/app

      - name: Publish CLI single-file (${{ matrix.rid }})
        run: >
          dotnet publish src/GPhotosTakeout.Cli/GPhotosTakeout.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -o publish/cli

      - name: Stage release EXEs (${{ matrix.rid }})
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $rid = "${{ matrix.rid }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "publish/app/GPhotosTakeout.App.exe" "dist/GPhotosTakeout-App-$v-$rid.exe" -Force
          Copy-Item "publish/cli/gptakeout.exe"          "dist/gptakeout-$v-$rid.exe" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.rid }}
          path: dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Software Bill of Materials: scans the source tree for all dependencies
      # (NuGet packages + transitive) so consumers can audit what shipped.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          artifact-name: sbom.spdx.json

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            dist/*.exe
            dist/sbom.spdx.json
