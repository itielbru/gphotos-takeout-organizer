name: Release

# Manually-dispatched portable release (Actions tab → Release → Run workflow,
# supply the version). Builds for win-x64 and attaches three artifacts to a
# draft GitHub Release:
#   - a one-click installer (Inno Setup) bundling the App + CLI: per-user
#     install, Start Menu shortcut, uninstaller — the recommended download
#   - the CLI as a single self-contained .exe (no XAML/WindowsAppSDK dependency,
#     so .NET's PublishSingleFile works cleanly for it)
#   - the App as a self-contained folder, zipped (portable alternative to the
#     installer). WinUI 3's unpackaged PublishSingleFile mode is NOT used here:
#     combining it with WindowsAppSDKSelfContained crashes on startup for every
#     user with STATUS_STOWED_EXCEPTION in Microsoft.UI.Xaml.dll (resources.pri
#     isn't reliably available to the self-extracted temp copy) — a known
#     upstream issue, see microsoft/WindowsAppSDK#2597, #2978, #4603.
# ExifTool is not bundled — the App installs it on first run with one click (into
# %LocalAppData%\GPhotosTakeout\Tools), and the CLI reuses that install or takes
# an explicit --exiftool path.
#
# The release step creates the vX.Y.Z tag if it doesn't already exist.
# Deliberately NOT triggered on tag push: publishing the draft release creates
# the tag, and a tag trigger would re-run this whole workflow a second time
# against the already-published release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to embed in filenames and tag (e.g. 1.1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}" -replace '^v',''
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish App (self-contained folder, win-x64)
        run: >
          dotnet publish src/GPhotosTakeout.App/GPhotosTakeout.App.csproj
          -c Release -p:Platform=x64 -r win-x64
          --self-contained -p:WindowsPackageType=None
          -o publish/app

      - name: Publish CLI single-file
        run: >
          dotnet publish src/GPhotosTakeout.Cli/GPhotosTakeout.Cli.csproj
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -o publish/cli

      # Bundle the pinned ExifTool build into the App's Tools folder so metadata
      # writing works out of the box — no separate first-run download. The version
      # and SHA-256 are parsed from ExifToolInstaller.cs (the single source of
      # truth; the in-app installer remains for source builds and updates). Both
      # the App and the CLI already probe <exe dir>\Tools for exiftool.exe.
      - name: Bundle ExifTool
        shell: pwsh
        run: |
          $src = Get-Content src/GPhotosTakeout.App/Services/ExifToolInstaller.cs -Raw
          $ver = [regex]::Match($src, 'Version\s*=\s*"([^"]+)"').Groups[1].Value
          $sha = [regex]::Match($src, 'Sha256\s*=\s*"([^"]+)"').Groups[1].Value
          if (-not $ver -or -not $sha) { throw "Could not parse pinned ExifTool version/sha from ExifToolInstaller.cs" }
          $zip = "exiftool.zip"
          $urls = @(
            "https://master.dl.sourceforge.net/project/exiftool/exiftool-${ver}_64.zip?viasf=1",
            "https://exiftool.org/exiftool-${ver}_64.zip"
          )
          $ok = $false
          foreach ($u in $urls) {
            try { Invoke-WebRequest $u -OutFile $zip; $ok = $true; break }
            catch { Write-Warning "download failed: $u ($($_.Exception.Message))" }
          }
          if (-not $ok) { throw "Could not download ExifTool $ver from any mirror" }
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash
          if ($hash -ne $sha) { throw "ExifTool checksum mismatch: expected $sha got $hash" }
          Expand-Archive $zip -DestinationPath exiftool-x
          $root = Get-ChildItem exiftool-x -Directory | Select-Object -First 1
          if (-not $root) { $root = Get-Item exiftool-x }
          $tools = "publish/app/Tools"
          New-Item -ItemType Directory -Force $tools | Out-Null
          $exe = Get-ChildItem $root.FullName -Filter "exiftool*.exe" | Select-Object -First 1
          if (-not $exe) { throw "exiftool executable not found in archive" }
          Copy-Item $exe.FullName "$tools/exiftool.exe"
          if (Test-Path "$($root.FullName)/exiftool_files") {
            Copy-Item "$($root.FullName)/exiftool_files" "$tools/exiftool_files" -Recurse
          }
          $readme = Get-ChildItem $root.FullName -Filter "README*" | Select-Object -First 1
          if ($readme) { Copy-Item $readme.FullName "$tools/exiftool-LICENSE.txt" }
          & "$tools/exiftool.exe" -ver

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish/app/* -DestinationPath "dist/GPhotosTakeout-App-$v-win-x64.zip" -Force
          Copy-Item "publish/cli/gptakeout.exe" "dist/gptakeout-$v-win-x64.exe" -Force

      # Inno Setup 6 is preinstalled on windows-latest runners. Packages
      # publish/app + publish/cli into dist/GPhotosTakeout-Setup-<v>-win-x64.exe.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$v installer\setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.zip
            dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          v="${{ inputs.version }}"
          echo "name=v${v#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Software Bill of Materials: scans the source tree for all dependencies
      # (NuGet packages + transitive) so consumers can audit what shipped.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          artifact-name: sbom.spdx.json

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          draft: true
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            dist/*.zip
            dist/*.exe
            dist/sbom.spdx.json
